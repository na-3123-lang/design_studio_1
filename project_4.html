<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SIRENA COFE</title>

  <style>
    @font-face {
      font-family: 'TTSupermolotExpBold';
      src: url('fonts/TTSupermolotNeue-ExpBold.woff2') format('woff2');
      font-weight: 800;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'TTSupermolotCondRegular';
      src: url('fonts/TTSupermolotNeue-CondRegular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'TTSupermolotExpMad';
      src: url('fonts/TTSupermolotNeue-ExpMed.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'TTSupermolotNeueExpLight';
      src: url('fonts/TTSupermolotNeue-ExpLight.woff2') format('woff2');
      font-weight: 200;
      font-style: normal;
      font-display: swap;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'TTSupermolotCondRegular', Arial, sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    p,
    a,
    input,
    button,
    div {
      font-family: 'TTSupermolotCondRegular', Arial, sans-serif;
    }

    h1,
    .project-title,
    .header-inner .logo {
      font-family: 'TTSupermolotExpBold', Arial, sans-serif;
      font-weight: 800;
      font-style: normal;
    }

    .project-subtitle {
      font-family: 'TTSupermolotNeueExpLight', Arial, sans-serif;
      font-weight: 200;
    }

    .contact-inner {
      font-family: 'TTSupermolotExpMad', Arial, sans-serif;
      font-weight: 500;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #f2f2f2;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
      background: white;
      border-bottom: 2px solid #2f6fe4;

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header a {
      text-decoration: none;
      color: black;
      font-size: 14px;
    }

    .header-left a {
      margin-right: 20px;
    }

    .header-right a {
      margin-left: 20px;
    }

    .logo {
      font-family: 'TTSupermolotExpBold', Arial, sans-serif;
      font-weight: 800;
      font-style: normal;
      letter-spacing: 0;
    }

    /* WHITE BLOCK */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 0 80px;
      box-sizing: border-box;
      background: white;
      overflow: hidden;
    }

    /* TITLE */
    .project-heading {
      text-align: center;
      padding: 70px 20px 60px;
      box-sizing: border-box;
    }

    .project-title {
      margin: 0;
      font-size: 92px;
      line-height: 0.9;
      letter-spacing: -3px;
    }

    .project-subtitle {
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1;
      text-transform: uppercase;
      color: black;
    }

    /* GALLERY */
    .gallery {
      width: 100%;
      margin: 0;
      padding: 0;
    }

    .row {
      display: grid;
      gap: 15px;
      margin-bottom: 15px;
    }

    .one {
      grid-template-columns: 1fr;
    }

    .two {
      grid-template-columns: 1fr 1fr;
    }

    .wide {
      grid-template-columns: 1fr;
    }

    .row img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .one img,
    .wide img {
      height: auto;
    }

    .two img {
      height: 470px;
    }

    /* CONTACT */
    .contact {
      max-width: 900px;
      margin: 0 auto;
      background: #1478f2;
      color: white;
      box-sizing: border-box;
    }

    .contact-inner {
      padding: 80px 90px;
      font-size: 60px;
      line-height: 1.2;
      box-sizing: border-box;
    }

    /* ADAPTIVE */
    @media (max-width: 900px) {
      .header-inner {
        max-width: 100%;
        gap: 10px;
      }

      .container {
        padding: 20px 0 60px;
      }

      .project-heading {
        padding: 60px 20px 50px;
      }

      .project-title {
        font-size: 56px;
        letter-spacing: -2px;
      }

      .project-subtitle {
        font-size: 12px;
      }

      .two {
        grid-template-columns: 1fr 1fr;
      }

      .two img {
        height: 300px;
      }

      .contact {
        max-width: 100%;
      }

      .contact-inner {
        padding: 80px 20px;
        font-size: 38px;
      }
    }

    @media (max-width: 520px) {
      .two img {
        height: 230px;
      }

      header a {
        font-size: 12px;
      }

      .header-left a {
        margin-right: 10px;
      }

      .header-right a {
        margin-left: 10px;
      }
    }
  </style>
</head>

<body>

</html>
